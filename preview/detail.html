<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本eSIM · Holafly</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-mono:'JetBrains Mono','SF Mono','Menlo','Roboto Mono',monospace;
      --rose-50:#ffefef; --rose-100:#ffe0e0; --rose-500:#e6485c;
      --green-50:#ecfff4; --green-100:#d6ffe7; --green-500:#48ec86; --green-700:#179b50;
      --blue-50:#edf9fe; --blue-100:#dcf4ff; --blue-500:#4db5e8;
      --neutral-50:#fff; --neutral-100:#f8f8fb; --neutral-200:#e4e6ea; --neutral-300:#ccd0d7;
      --neutral-400:#7b7c7e; --neutral-600:#56575a; --neutral-900:#272729;
      --mp-width:393px; --mp-height:852px; --safe-area-bottom:34px;
      --padding-12:12px; --padding-16:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;background:#e8e8ec;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;color:var(--neutral-900)}
    .preview-label{font-size:14px;color:var(--neutral-600);margin-bottom:16px}
    .device{width:var(--mp-width);height:var(--mp-height);border-radius:40px;overflow:hidden;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.18);background:linear-gradient(151.84deg,#c8ebfe 2.09%,#fcecfc 15.98%,var(--rose-50) 35.2%,var(--neutral-50) 54.59%)}
    .status-bar{position:absolute;top:0;left:0;right:0;z-index:20;height:47px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:17px;font-weight:600;pointer-events:none}
    .detail-nav{position:absolute;top:47px;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 7px;height:44px}
    .detail-nav__back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;padding:0;flex-shrink:0}
    .detail-nav__back img{width:9px;height:16.5px;display:block;flex-shrink:0}
    .nav-capsule{display:flex;align-items:center;justify-content:center;height:30px;background:rgba(255,255,255,.7);border:1px solid #dedede;border-radius:15px}
    .nav-capsule--support{width:30px}
    .nav-capsule--menu{width:83px;gap:0;padding:0 10px}
    .nav-capsule img{display:block}
    .nav-capsule__icon{width:16px;height:16px}
    .nav-capsule__sep{width:1px;height:13px;margin:0 8px}
    .detail-nav__right{display:flex;gap:6px}
    .detail-scroll{position:absolute;top:91px;left:0;right:0;bottom:150px;overflow-y:auto;padding:4px 20px 24px}
    .stack{display:flex;flex-direction:column;gap:16px}
    .panel{background:#fff;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,.05)}
    .product-header{display:flex;flex-direction:column;gap:10px;padding:2px 12px}
    .product-header__row{display:flex;align-items:center;gap:12px}
    .product-header__flag{width:50px;height:50px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .product-header__title{font-size:20px;font-weight:500;line-height:28px}
    .product-header__tags{display:flex;flex-wrap:wrap;gap:6px}
    .product-header__tag{display:flex;align-items:center;gap:6px;padding:4px 8px;background:#fff;border-radius:6px;font-size:14px;font-weight:500;color:var(--rose-500)}
    .product-header__tag img{width:14px;height:14px}
    .why-card{padding:20px 16px 16px;background:linear-gradient(159.83deg,#fff3ec 21.15%,#fff 66.95%);border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,.05)}
    .why-card__hero{display:flex;flex-direction:column;gap:4px}
    .why-card__brand{width:87px;height:24px;display:block}
    .why-card__tagline{font-size:18px;font-weight:500;line-height:24px;color:var(--neutral-900)}
    .why-card__tagline em{font-style:normal;color:var(--rose-500)}
    .why-card__body{display:flex;flex-direction:column;gap:24px;margin-top:12px}
    .why-features{display:flex;flex-direction:column;gap:4px}
    .why-feature{display:flex;align-items:center;gap:12px;padding:8px 0}
    .why-feature__icon-wrap{flex-shrink:0;padding:7.5px;background:#fff;border-radius:12.5px}
    .why-feature__icon{width:35px;height:35px;display:block;object-fit:cover}
    .why-feature__body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
    .why-feature__title{font-size:15px;font-weight:500;color:var(--neutral-600);line-height:22px}
    .why-feature__desc{font-size:12px;color:var(--neutral-600);line-height:18px}
    .why-promise{display:flex;flex-direction:column;gap:12px}
    .why-promise__title{font-size:16px;font-weight:500;line-height:24px}
    .config-section__qty-labels{display:flex;align-items:center;gap:8px}
    .config-section__qty-divider{width:1px;height:13px;background:var(--neutral-200)}
    .config-label.config-section__label--sub{font-size:12px;font-weight:400;color:var(--neutral-600);line-height:18px}
    .config-card{border-radius:24px;border:2px solid var(--rose-500);overflow:hidden}
    .config-card__wrap{background:linear-gradient(180deg,var(--rose-50) 6.5%,#fff 100%);box-shadow:0 15px 20px #ffece1}
    .config-card__inner{padding:16px 16px 12px;display:flex;flex-direction:column;gap:24px}
    .config-card__promo{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 16px 12px;background:linear-gradient(90deg,#e6485c 0%,#f9733d 95.7%)}
    .config-card__promo-left{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
    .config-card__promo-daily{display:flex;align-items:center;flex-wrap:wrap;gap:4px;color:#fff}
    .config-card__promo-daily-label,.config-card__promo-daily-unit{font-size:14px;font-weight:500}
    .config-card__promo-daily-amount{font-size:26px;font-weight:600;line-height:32px;letter-spacing:-.52px}
    .config-card__promo-tags{display:flex;flex-wrap:wrap;gap:4px}
    .config-card__promo-tag{padding:2px 4px;background:#fff;border-radius:4px;font-size:12px;font-weight:500;color:var(--rose-500);white-space:nowrap}
    .config-card__promo-countdown{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
    .config-card__promo-countdown-label{font-size:12px;color:#fff}
    .config-card__promo-timer{display:flex;align-items:center;gap:6px}
    .config-card__promo-timer-box{min-width:21px;padding:2px;background:rgba(0,0,0,.4);border-radius:4px;font-family:var(--font-mono);font-size:14px;color:#fff;text-align:center}
    .config-card__promo-timer-sep{font-family:var(--font-mono);font-size:14px;color:#fff}
    .compat-card{display:flex;align-items:center;gap:12px;padding:18px 12px 20px 8px;border-radius:10px;background:linear-gradient(139deg,var(--blue-50) 11.21%,var(--green-50) 89.26%);cursor:pointer}
    .compat-card__icon{width:40px;height:40px;flex-shrink:0}
    .compat-card__content{flex:1;min-width:0}
    .compat-card__title{display:block;font-size:15px;font-weight:500;line-height:22px}
    .compat-card__subtitle{display:block;margin-top:2px;font-size:12px;color:var(--neutral-600)}
    .compat-card__arrow{width:16px;height:16px;flex-shrink:0}
    .config-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .config-section--days{display:flex;flex-direction:column;gap:12px}
    .config-section--days .config-head{margin-bottom:0}
    .config-label-row{display:flex;align-items:center;gap:8px}
    .config-label-row img{display:block;width:20px;height:20px;max-width:20px;max-height:20px;object-fit:contain;flex-shrink:0}
    .config-label{font-size:15px;font-weight:500}
    .config-badge{padding:4px 6px;background:var(--green-100);border-radius:4px;font-size:12px;color:var(--green-700)}
    .day-grid{display:flex;gap:8px}
    .day-chip{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;padding:12px 16px;box-sizing:border-box;background:#fff;border:1px solid var(--neutral-200);border-radius:10px;cursor:pointer}
    .day-chip__label{font-size:15px;font-weight:500;line-height:22px;color:var(--neutral-600);white-space:nowrap}
    .day-chip--active{background:var(--rose-50);border-color:var(--rose-500)}
    .day-chip--active .day-chip__label{color:var(--rose-500)}
    .day-custom{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 16px;box-sizing:border-box;background:#fff;border:1px solid var(--neutral-200);border-radius:10px;font-size:15px;font-weight:500;line-height:24px;color:var(--neutral-600);cursor:pointer;appearance:none;-webkit-appearance:none}
    .day-custom--active{background:var(--rose-50);border-color:var(--rose-500);color:var(--rose-500)}
    .date-sheet-mask{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,.45);display:none;align-items:flex-end}
    .date-sheet-mask.is-open{display:flex}
    .date-sheet{width:100%;max-height:88%;display:flex;flex-direction:column;padding:16px 16px calc(16px + env(safe-area-inset-bottom,var(--safe-area-bottom)));background:#fff;border-radius:16px 16px 0 0;box-sizing:border-box}
    .date-sheet__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0}
    .date-sheet__header-left{display:flex;align-items:center;gap:8px;min-width:0}
    .date-sheet__title{font-size:16px;font-weight:500;flex-shrink:0}
    .date-sheet__divider{width:1px;height:14px;background:var(--neutral-200);flex-shrink:0}
    .date-sheet__header-days{font-size:16px;font-weight:500;color:var(--neutral-600);flex-shrink:0}
    .date-sheet__close{border:none;background:transparent;font-size:24px;color:var(--neutral-400);cursor:pointer;padding:0 4px;flex-shrink:0}
    .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:8px;flex-shrink:0}
    .cal-weekdays span{display:flex;align-items:center;justify-content:center;height:28px;font-size:12px;color:var(--neutral-600)}
    .cal-weekdays span.is-weekend{color:var(--rose-500)}
    .date-sheet__calendar{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 4px}
    .cal-month{margin-bottom:16px}
    .cal-month__title{font-size:16px;font-weight:600;line-height:24px;margin-bottom:8px}
    .cal-month__grid{display:flex;flex-direction:column;gap:4px}
    .cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
    .cal-day{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:48px;border:none;background:transparent;padding:4px 0;cursor:pointer;font:inherit;color:var(--neutral-900)}
    .cal-day--empty{pointer-events:none}
    .cal-day--disabled{color:var(--neutral-200);cursor:not-allowed}
    .cal-day__num{font-size:15px;line-height:22px;font-weight:500}
    .cal-day__tag{font-size:10px;line-height:12px;color:var(--rose-500);margin-top:2px}
    .cal-day--in-range{background:var(--green-50)}
    .cal-day--start,.cal-day--end,.cal-day--single{background:var(--green-500);color:#272729;border-radius:10px}
    .cal-day--start:not(.cal-day--end){border-radius:10px 0 0 10px}
    .cal-day--end:not(.cal-day--start){border-radius:0 10px 10px 0}
    .cal-day--start.cal-day--end,.cal-day--single{border-radius:10px}
    .cal-day--start .cal-day__tag,.cal-day--end .cal-day__tag,.cal-day--single .cal-day__tag{color:#272729;opacity:.8}
    .date-sheet__footer{flex-shrink:0;padding-top:12px}
    .date-sheet__confirm{width:100%;height:48px;border:none;border-radius:10px;background:var(--green-500);font-size:16px;font-weight:500;cursor:pointer}
    .date-sheet__confirm-sep{margin:0 6px;font-weight:300;font-size:14px;color:rgba(39,39,41,.28)}
    .day-custom img{width:20px;height:20px;object-fit:contain;flex-shrink:0}
    .qty-stepper{display:flex;height:44px;border:1px solid var(--neutral-200);border-radius:10px;overflow:hidden}
    .qty-stepper__btn{width:44px;display:flex;align-items:center;justify-content:center;background:#fff;border:none;border-right:1px solid var(--neutral-200);padding:0;appearance:none;-webkit-appearance:none;cursor:pointer}
    .qty-stepper__btn:last-child{border:none;border-left:1px solid var(--neutral-200)}
    .qty-stepper__btn img{width:24px;height:24px}
    .qty-stepper__value{flex:1;display:flex;align-items:center;justify-content:center;background:#fff;font-size:18px;font-weight:500;color:var(--neutral-600)}
    .price-row{display:flex;justify-content:flex-end;align-items:center;padding-top:16px;border-top:1px solid var(--neutral-200)}
    .price-total{display:flex;align-items:center;gap:6px;color:var(--rose-500);font-weight:600}
    .price-total__value{display:flex;align-items:center;gap:2px}
    .price-total__currency{font-size:18px;font-weight:600;line-height:24px}
    .price-total__amount{font-size:24px;font-weight:600;line-height:32px}
    .price-side{text-align:right}
    .price-daily{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--neutral-600)}
    .price-daily__currency{font-size:18px;font-weight:600;line-height:24px;color:var(--rose-500)}
    .price-daily__amount{font-size:30px;font-weight:600;line-height:1;color:var(--rose-500)}
    .price-promo{margin-top:4px;display:flex;gap:12px;align-items:center;justify-content:flex-end}
    .price-promo del{font-size:12px;color:var(--neutral-600);opacity:.7}
    .price-promo span{padding:2px 4px;background:var(--rose-100);border-radius:4px;font-size:12px;color:var(--rose-500)}
    .panel{padding:16px}
    .panel__head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .panel__title{font-size:16px;font-weight:500;line-height:24px}
    .panel>.panel__title{display:block;margin-bottom:12px}
    .panel__link{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--neutral-600);cursor:pointer}
    .panel__link--blue{color:#0d8cc2}
    .panel__link img{width:16px;height:16px}
    .panel__subtitle{display:block;font-size:12px;color:var(--neutral-600);line-height:16px}
    .panel__intro{display:flex;flex-direction:column;gap:4px;position:relative;z-index:1}
    .panel--apps{position:relative;overflow:hidden;display:flex;flex-direction:column;gap:16px}
    .panel__deco{position:absolute;pointer-events:none}
    .panel__deco--apps{width:111px;height:92px;top:0;right:0;z-index:0;object-fit:contain;object-position:right top}
    .panel--apps .panel__intro{max-width:215px;position:relative;z-index:1}
    .panel--apps .panel__subtitle{line-height:18px;color:var(--neutral-600)}
    .panel--apps .panel__divider{margin:0;position:relative;z-index:1}
    .panel__apps-body{display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
    .panel__divider{height:1px;background:var(--neutral-200);margin-bottom:12px}
    .reviews-card{padding:16px;background:#fff;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,.05)}
    .reviews-card__header{display:flex;align-items:center;justify-content:space-between}
    .reviews-card__brand{display:flex;flex-direction:column;gap:4px}
    .reviews-card__logo{width:91px;height:24px;display:block}
    .reviews-card__count{font-size:14px;color:var(--neutral-400)}
    .reviews-card__rating{display:flex;align-items:flex-end;gap:3px}
    .reviews-card__score{font-family:var(--font-mono);font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--rose-500);line-height:1}
    .reviews-card__max{font-family:var(--font-mono);font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--neutral-900);line-height:1;padding-bottom:1px}
    .reviews-card__arrow{width:16px;height:16px}
    .reviews-card__divider{height:1px;margin:16px 0;background:var(--neutral-200)}
    .reviews-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .reviews-list{display:flex;flex-direction:row;gap:12px;padding-right:4px}
    .review-item{width:148px;flex-shrink:0;padding:10px 16px;background:var(--neutral-100);border-radius:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 2px rgba(0,0,0,.05)}
    .review-item__top{display:flex;align-items:center;justify-content:space-between}
    .review-item__name{font-size:15px;font-weight:500;color:var(--neutral-900)}
    .review-item__badge{padding:2px 4px;background:var(--rose-100);border-radius:4px}
    .review-item__badge-text{font-family:var(--font-mono);font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--rose-500)}
    .review-item__text{font-size:15px;color:var(--neutral-600);line-height:1.47}
    .review-item__meta{font-size:12px;color:var(--neutral-400)}
    .faq-item{display:flex;flex-direction:column;padding:12px;border:1px solid var(--neutral-200);border-radius:10px;background:#fff}
    .faq-item+.faq-item{margin-top:12px}
    .faq-item__row{display:flex;align-items:center;gap:12px;width:100%;cursor:pointer}
    .faq-item--highlight{background:linear-gradient(139deg,var(--blue-50) 11%,#ecfff4 89%);border-color:rgba(255,255,255,.9);padding:18px 12px 20px 8px}
    .faq-item--open{padding-bottom:14px}
    .faq-item__icon{width:40px;height:40px;flex-shrink:0}
    .faq-item__content{flex:1;min-width:0}
    .faq-item__title{display:block;font-size:14px;font-weight:400;line-height:20px}
    .faq-item--highlight .faq-item__title{font-size:16px;font-weight:500;line-height:24px}
    .faq-item__subtitle{display:block;margin-top:2px;font-size:12px;color:var(--neutral-600)}
    .faq-item__arrow{width:16px;height:16px;flex-shrink:0;transition:transform .2s ease}
    .faq-item__arrow--open{transform:rotate(90deg)}
    .faq-item__answer{display:none;margin-top:8px;font-size:14px;color:var(--neutral-600);line-height:1.43}
    .faq-item--open .faq-item__answer{display:block}
    .compat-sheet-mask{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s ease}
    .compat-sheet-mask.is-open{opacity:1;pointer-events:auto}
    .compat-sheet{position:absolute;left:0;right:0;bottom:0;z-index:51;width:100%;height:82%;display:flex;flex-direction:column;gap:8px;background:#fff;border-radius:24px 24px 0 0;padding:12px 0 calc(24px + env(safe-area-inset-bottom,var(--safe-area-bottom)));box-sizing:border-box;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);pointer-events:none;will-change:transform}
    .compat-sheet.is-open{transform:translateY(0);pointer-events:auto}
    .compat-sheet__handle-wrap{display:flex;justify-content:center;padding:4px 0 8px;flex-shrink:0}
    .compat-sheet__handle{width:36px;height:4px;border-radius:999px;background:var(--neutral-200)}
    .compat-sheet__header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;min-height:52px;flex-shrink:0;box-sizing:border-box}
    .compat-sheet__title{flex:1;font-size:18px;font-weight:500;line-height:24px}
    .compat-sheet__close{border:none;background:transparent;padding:0;cursor:pointer;width:28px;height:28px}
    .compat-sheet__close img{width:28px;height:28px;display:block}
    .compat-device-block{display:flex;flex-direction:column;gap:4px}
    .compat-sheet__section{display:flex;flex-direction:column;gap:8px;padding:8px 20px 0;flex-shrink:0;box-sizing:border-box}
    .compat-sheet__body{display:flex;flex-direction:column;gap:16px;padding:16px 20px 0;flex:1;min-height:0;overflow-y:auto;box-sizing:border-box}
    .compat-sheet__label{display:block;font-size:12px;color:var(--neutral-400);line-height:16px}
    .compat-step-label{display:block;font-size:12px;color:var(--neutral-400);line-height:16px;margin:0;padding-left:18px;text-indent:-18px}
    .compat-version-row{display:flex;gap:8px}
    .compat-version{flex:1;min-width:0;display:flex;align-items:center;gap:8px;padding:12px 16px;border:1px solid var(--neutral-200);border-radius:16px;background:#fff;cursor:pointer;box-sizing:border-box}
    .compat-version--active.compat-version--cn{background:var(--blue-50);border-color:var(--blue-500)}
    .compat-version--active.compat-version--global{background:var(--rose-50);border-color:var(--rose-500)}
    .compat-version img{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover}
    .compat-version__text{display:flex;flex-direction:column;gap:2px;min-width:0}
    .compat-version__title{display:block;font-size:16px;font-weight:500;line-height:24px}
    .compat-version__subtitle{display:block;font-size:12px;color:var(--neutral-400);line-height:16px}
    .compat-segment{display:flex;gap:4px;padding:4px;background:var(--neutral-200);border-radius:12px}
    .compat-segment__item{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 16px;border:none;border-radius:8px;background:transparent;font-size:14px;cursor:pointer}
    .compat-segment__item--active{background:#fff;box-shadow:0 2px 8px -4px rgba(0,0,0,.2)}
    .compat-search{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--neutral-100);border-radius:24px}
    .compat-search img{width:16px;height:16px;flex-shrink:0}

    function filterFaqByTab(tab){return PLAN.faq.filter(f=>f.tab===tab);}
    function pad(n){return n<10?`0${n}`:`${n}`;}
    function formatDateStr(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

    function formatRangeLabel(start,end){return `${formatShortLabel(start)} — ${formatShortLabel(end)}`;}
    function getDefaultDates(days){const t=new Date();return {start:formatDateStr(t),end:formatDateStr(addDays(t,days-1))};}
    function calcTotal(days,qty){return (PLAN.prices[days]||Math.round(PLAN.prices[7]/7*days))*qty;}
    function calcDaily(days){const unit=PLAN.prices[days]||Math.round(PLAN.prices[7]/7*days);return Math.round(unit/days*10)/10;}
    function calcSave(days,qty){
      const unitTotal=PLAN.prices[days]||Math.round(PLAN.prices[7]/7*days);
      const daily=calcDaily(days);

    function bindEvents(){
      document.getElementById('content').addEventListener('click',(e)=>{
        if(e.target.closest('#usage-guide-link')){location.href='install.html';return;}
        if(e.target.closest('#compat-card')){openCompatSheet();return;}
        const faqTab=e.target.closest('[data-faq-tab]');
        if(faqTab){
          selectedFaqTab=faqTab.dataset.faqTab;
          expandedFaqId='';
          renderFaq();
          return;
        }
        const faqRow=e.target.closest('.faq-item__row');
        if(faqRow){
          const item=faqRow.closest('.faq-item');
          const id=item?.dataset.faqId;
          expandedFaqId=expandedFaqId===id?'':id;
          renderFaq();
          return;
        }
        const chip=e.target.closest('.day-chip');
        if(chip){
          selectedDays=Number(chip.dataset.days);
          isCustomDays=false;
          customDaysLabel='';
          updateUI();
          return;
        }
        if(e.target.closest('#day-custom-btn')){openDateSheet();return;}
        if(e.target.closest('#qty-minus')){if(quantity>1){quantity--;updateUI();}return;}

      document.querySelector('.detail-footer__cta')?.addEventListener('click',()=>{
        location.href=buildLoginUrl();
      });
      document.getElementById('footer-support')?.addEventListener('click',()=>{
        alert('客服（待开发）');
      });
    }
    const sheetMask=document.getElementById('date-sheet-mask');

    const sheetHeaderDays=document.getElementById('sheet-header-days');
    const sheetConfirmBtn=document.getElementById('date-sheet-confirm');

    function parseDateStr(dateStr){const [y,m,d]=dateStr.split('-').map(Number);return new Date(y,m-1,d);}
    function compareDateStr(a,b){return parseDateStr(a)-parseDateStr(b);}

    function mountCalendarWeekdays(){
      calWeekdaysEl.innerHTML=CALENDAR_WEEKDAYS.map((label,i)=>`<span class="${i===0||i===6?'is-weekend':''}">${label}</span>`).join('');
    }

    function renderCalendar(){
      calEl.innerHTML=renderCalendarHtml(calendarMonths,sheetStartDate,sheetEndDate);

        const days=tripDays(sheetStartDate,sheetEndDate);
        sheetHeaderDays.textContent=`${days}天`;
        sheetHeaderDays.hidden=false;
        sheetHeaderDivider.hidden=false;
        sheetConfirmBtn.innerHTML=`${days}天<span class="date-sheet__confirm-sep">｜</span>确定`;
      }else{
        sheetHeaderDays.hidden=true;
        sheetHeaderDivider.hidden=true;
        sheetConfirmBtn.textContent='确定';
      }
    }

    function openDateSheet(){
      const d=getDefaultDates(selectedDays);
      sheetMinDate=formatDateStr(new Date());
      sheetMaxDate=formatDateStr(addYears(new Date(),1));
      sheetStartDate=d.start;
      sheetEndDate=d.end;
      calendarMonths=buildCalendarMonths(sheetMinDate,sheetMaxDate);
      mountCalendarWeekdays();
      renderCalendar();
      sheetMask.classList.add('is-open');
    }

    function closeDateSheet(){sheetMask.classList.remove('is-open');}

    calEl.addEventListener('click',(e)=>{
      const btn=e.target.closest('[data-date]');
      if(!btn||btn.disabled) return;
      const next=applyRangeTap(btn.dataset.date,sheetStartDate,sheetEndDate);
      sheetStartDate=next.startDate;
      sheetEndDate=next.endDate;
      renderCalendar();
    });

    document.getElementById('date-sheet-close').addEventListener('click',closeDateSheet);
    sheetMask.addEventListener('click',closeDateSheet);
    document.getElementById('date-sheet-confirm').addEventListener('click',()=>{
      if(!sheetStartDate||!sheetEndDate){alert('请选择出发与返回日期');return;}
      if(compareDateStr(sheetEndDate,sheetStartDate)<0){alert('返回日期不能早于出发');return;}
      selectedDays=tripDays(sheetStartDate,sheetEndDate);
      isCustomDays=true;
      customDaysLabel=formatRangeLabel(sheetStartDate,sheetEndDate);
      closeDateSheet();
      updateUI();
    });
    mountContent();
    mountCompatSheet();
    bindEvents();
    updateUI();
  </script>
