<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单列表 · Holafly</title>
  <style>
    :root {
      --rose-50:#ffefef; --rose-500:#e6485c;
      --green-100:#d6ffe7; --green-700:#179b50;
      --yellow-100:#ffeac0; --yellow-800:#92400e;
      --neutral-50:#fff; --neutral-100:#f8f8fb; --neutral-200:#e4e6ea;
      --neutral-400:#7b7c7e; --neutral-600:#56575a; --neutral-900:#272729;
      --mp-width:393px; --mp-height:852px; --safe-area-bottom:34px;
      --tab-bar-content:56px;
      --tab-bar:calc(var(--tab-bar-content) + env(safe-area-inset-bottom, var(--safe-area-bottom)));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;background:#e8e8ec;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;color:var(--neutral-900)}
    .preview-label{font-size:14px;color:var(--neutral-600);margin-bottom:16px}
    .device{width:var(--mp-width);height:var(--mp-height);border-radius:40px;overflow:hidden;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.18);background:linear-gradient(180deg,var(--rose-50) 6.5%,#fff 100%)}
    .status-bar{position:absolute;top:0;left:0;right:0;z-index:20;height:47px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:17px;font-weight:600;pointer-events:none}
    .orders-scroll{position:absolute;top:47px;left:0;right:0;bottom:var(--tab-bar);overflow-y:auto;padding:16px 20px 20px}
    .orders-stack{display:flex;flex-direction:column;gap:16px}
    .order-card{background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.05);overflow:hidden}
    .order-card__head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--neutral-200)}
    .order-card__time{font-size:15px;color:var(--neutral-400);line-height:22px}
    .order-card__arrow{width:16px;height:16px;flex-shrink:0;display:block}
    .order-card__body{padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
    .order-card__left{display:flex;align-items:center;gap:6px}
    .order-card__flag{width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--neutral-100)}
    .order-card__name{font-size:16px;font-weight:500;line-height:22px}
    .order-card__price-wrap{text-align:right}
    .order-card__price{font-size:16px;font-weight:500;line-height:24px}
    .order-card__qty{font-size:12px;color:var(--neutral-400);line-height:16px}
    .order-card__actions{display:flex;justify-content:flex-end;gap:12px;padding:8px 12px 12px}
    .order-card__btn{padding:8px 24px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--neutral-200);background:#fff;color:var(--neutral-400)}
    .order-card__btn--primary{border:none;background:var(--rose-500);color:#fff}
    .tab-bar{position:absolute;left:0;right:0;bottom:0;z-index:10;display:flex;flex-direction:column;background:rgba(248,248,248,.8);backdrop-filter:blur(30px);box-shadow:0 -2px 12px rgba(0,0,0,.04)}
    .tab-bar__inner{display:flex;min-height:var(--tab-bar-content);flex-shrink:0}
    .tab-bar__safe{flex-shrink:0;width:100%;height:env(safe-area-inset-bottom,var(--safe-area-bottom));background:inherit}
    .tab-bar__item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 0 4px;text-decoration:none;color:var(--neutral-600)}
    .tab-bar__icon-wrap{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
    .tab-bar__icon{width:17px;height:19px;object-fit:contain}
    .tab-bar__text{font-size:10px;color:var(--neutral-600)}
    .tab-bar__item--active .tab-bar__text{color:var(--rose-500);font-weight:500}
  </style>
</head>
<body>
  <p class="preview-label">订单列表 · Figma 259:610</p>
  <div class="device">
    <div class="status-bar">9:41</div>
    <div class="orders-scroll">
      <div class="orders-stack">
        <article class="order-card">
          <div class="order-card__head">
            <span class="order-card__time">2026-05-20 18:38</span>
            <img class="order-card__arrow" src="images/orders/icon-chevron-right.svg" alt="" aria-hidden="true" />
          </div>
          <div class="order-card__body" data-order-no="HF20260520183829" role="button" tabindex="0" aria-label="查看订单详情">
            <div class="order-card__left">
              <img class="order-card__flag" src="images/orders/flag-jp.png" alt="" />
              <span class="order-card__name">日本eSIM·7天</span>
            </div>
            <div class="order-card__price-wrap">
              <div class="order-card__price">¥63.00</div>
              <div class="order-card__qty">共 1 张</div>
            </div>
          </div>
          <div class="order-card__actions">
            <button class="order-card__btn" type="button" data-action="support">联系客服</button>
            <button class="order-card__btn" type="button">安装教程</button>
          </div>
        </article>
        <article class="order-card">
          <div class="order-card__head">
            <span class="order-card__time">2026-05-18 09:15</span>
            <img class="order-card__arrow" src="images/orders/icon-chevron-right.svg" alt="" aria-hidden="true" />
          </div>
          <div class="order-card__body" data-order-no="HF20260520183830" role="button" tabindex="0" aria-label="查看订单详情">
            <div class="order-card__left">
              <img class="order-card__flag" src="images/orders/flag-th.png" alt="" />
              <span class="order-card__name">泰国eSIM·5天</span>
            </div>
            <div class="order-card__price-wrap">
              <div class="order-card__price">¥45.00</div>
              <div class="order-card__qty">共 3 张</div>
            </div>
          </div>
          <div class="order-card__actions">
            <button class="order-card__btn" type="button" data-action="invoice">申请开票</button>
            <button class="order-card__btn" type="button" data-action="repurchase">再次购买</button>
          </div>
        </article>
        <article class="order-card">
          <div class="order-card__head">
            <span class="order-card__time">2026-04-10 12:00</span>
            <img class="order-card__arrow" src="images/orders/icon-chevron-right.svg" alt="" aria-hidden="true" />
          </div>
          <div class="order-card__body" data-order-no="HF20260520183831" role="button" tabindex="0" aria-label="查看订单详情">
            <div class="order-card__left">
              <img class="order-card__flag" src="images/orders/flag-jp.png" alt="" />
              <span class="order-card__name">日本eSIM·7天</span>
            </div>
            <div class="order-card__price-wrap">
              <div class="order-card__price">¥63.00</div>
              <div class="order-card__qty">共 1 张</div>
            </div>
          </div>
          <div class="order-card__actions">
            <button class="order-card__btn" type="button" data-action="invoice">申请开票</button>
            <button class="order-card__btn" type="button" data-action="repurchase">再次购买</button>
          </div>
        </article>
      </div>
    </div>
    <nav class="tab-bar">
      <div class="tab-bar__inner">
        <a class="tab-bar__item" href="index.html">
          <div class="tab-bar__icon-wrap">
            <img class="tab-bar__icon" src="images/home/tab-home-inactive.svg" alt="" />
          </div>
          <span class="tab-bar__text">首页</span>
        </a>
        <a class="tab-bar__item tab-bar__item--active" href="orders.html">
          <div class="tab-bar__icon-wrap">
            <img class="tab-bar__icon" src="images/home/tab-orders-active.svg" alt="" />
          </div>
          <span class="tab-bar__text">订单</span>
        </a>
        <a class="tab-bar__item" href="profile.html">
          <div class="tab-bar__icon-wrap">
            <img class="tab-bar__icon" src="images/home/tab-profile.svg" alt="" />
          </div>
          <span class="tab-bar__text">我的</span>
        </a>
      </div>
      <div class="tab-bar__safe" aria-hidden="true"></div>
    </nav>
  </div>
  <script>
    function goOrderDetail(orderNo) {
      location.href = `order-detail.html?orderNo=${encodeURIComponent(orderNo)}`;
    }

    document.querySelectorAll('.order-card__body[data-order-no]').forEach((body) => {
      body.addEventListener('click', () => goOrderDetail(body.dataset.orderNo));
      body.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          goOrderDetail(body.dataset.orderNo);
        }
      });
    });

    document.querySelectorAll('[data-action="support"]').forEach((btn) => {
      btn.addEventListener('click', () => alert('联系客服（待开发）'));
    });

    document.querySelectorAll('[data-action="invoice"]').forEach((btn) => {
      btn.addEventListener('click', () => alert('申请开票（待开发）'));
    });

    document.querySelectorAll('[data-action="repurchase"]').forEach((btn) => {
      btn.addEventListener('click', () => { location.href = 'index.html'; });
    });
  </script>
</body>
</html>
